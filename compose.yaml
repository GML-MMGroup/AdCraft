name: adcraft

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - ./apps/api/.env
    environment:
      HOME: /tmp
      MEDIA_DATA_DIR: /app/data
      LOCAL_SETTINGS_ALLOWED_ORIGINS: "http://127.0.0.1:${ADCRAFT_PORT},http://localhost:${ADCRAFT_PORT}"
    user: "${ADCRAFT_UID:-1000}:${ADCRAFT_GID:-1000}"
    init: true
    expose:
      - "8000"
    volumes:
      - ./apps/api:/app
      - ./runtime-data/api:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped
    networks:
      - adcraft-internal

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${ADCRAFT_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    networks:
      - adcraft-internal

networks:
  adcraft-internal:
    name: adcraft-internal
